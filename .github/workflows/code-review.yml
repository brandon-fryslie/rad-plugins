name: AI Code Review with Z.ai

on:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  review:
    name: Review
    # Only run on this repo's own PRs. Fork PRs don't run here (they have no
    # secret anyway); a fork that wants reviews runs this workflow on its own
    # account.
    if: github.event.pull_request.head.repo.full_name == github.repository
    runs-on: ubuntu-latest
    steps:
      - name: Checkout pull request
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.pull_request.head.sha }}

      - name: Code Review
        uses: brandon-fryslie/zai-coding-agent-review@v1
        with:
          ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
